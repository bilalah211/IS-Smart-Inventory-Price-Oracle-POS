name: smartinevntary
description: "A new Flutter project."


publish_to: 'none'













version: 1.0.0+1

environment:
  sdk: ^3.11.4







dependencies:
  flutter:
    sdk: flutter



  cupertino_icons: ^1.0.8

  #---Packages---#
  #Firebase#
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0

  #Bloc#
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  #Alert Message#
  another_flushbar: ^1.12.32

  #Local Storage#
  shared_preferences: ^2.5.5

  #Animation#
  lottie: ^3.3.3

  #Mobile Scanner#
  mobile_scanner: ^7.2.0

  #Shimmer Effect#
  shimmer: ^3.0.0

  #Launcher Icon#
  flutter_launcher_icons: ^0.13.1







dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"





  flutter_lints: ^6.0.0





flutter:


  uses-material-design: true


  #APP IMAGES#
  assets:
    - assets/logo/
    - assets/loader/
    - assets/social/
    - assets/pngs/

   
 
     

   
   

   
   

   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
   
